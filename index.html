<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Dmitrii Titaev">
    <title>Software Shortcuts</title>
    <style>
        :root {
            --bg-main: #0b0f19;     
            --bg-panel: #0d1321;    
            --bg-card: #131c2f;     
            --border-dim: #1e293b;  
            --text-base: #64748b;   
            --text-main: #d4d4d4;   
            --key-bg: #1e293b;
            --active-bg: rgba(255,255,255,0.04);
            --item-hover: rgba(255,255,255,0.02);
        }

        [data-theme="light"] {
            --bg-main: #f8fafc;     
            --bg-panel: #ffffff;    
            --bg-card: #ffffff;     
            --border-dim: #cbd5e1;  
            --text-base: #64748b;   
            --text-main: #333333;   
            --key-bg: #f1f5f9; 
            --active-bg: rgba(0,0,0,0.03);
            --item-hover: rgba(0,0,0,0.02);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: Tahoma, "MS Sans Serif", sans-serif;
            font-weight: 400;
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-size: 11px;
            -webkit-font-smoothing: none; 
            font-smooth: never;
            text-rendering: crispEdges; 
            transition: background-color 0.3s, color 0.3s;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-base); }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            padding: 15px 15px 60px 15px; 
            z-index: 10;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .brand {
            font-size: 15px;
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 14px; 
            padding-left: 5px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1;
        }

        /* Search Box */
        .search-box {
            margin-bottom: 16px; 
            padding: 0 11px 0 5px; 
        }
        .search-input {
            width: 100%;
            height: 34px; 
            background: var(--bg-main);
            border: 1px solid var(--border-dim);
            color: var(--text-main);
            padding: 0 10px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 11px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--text-base); }
        .search-input::placeholder { color: var(--text-base); }

        .nav-list {
            flex: 1;
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 5px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-base);
            padding: 6px 10px; 
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-btn:hover { background: var(--item-hover); color: var(--text-main); }
        .nav-btn.active { background: var(--active-bg); border-color: var(--border-dim); color: var(--app-color); }
        
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-left > span { position: relative; top: -1px; }
        
        .logo-box {
            font-weight: normal; 
            font-size: 11px; 
            letter-spacing: 0; 
            color: inherit;
            width: 20px; 
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1; 
            border: 1px solid currentColor; 
            border-radius: 4px; 
            transition: opacity 0.2s;
            opacity: 0.8; 
        }
        .nav-btn:hover .logo-box, .nav-btn.active .logo-box { opacity: 1; }

        /* Sidebar Bottom */
        .sidebar-bottom {
            margin-top: auto;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px; 
            padding: 15px 5px 0 5px; 
            border-top: 1px solid var(--border-dim);
            color: var(--text-base); 
        }
        
        .theme-label {
            text-align: center;
            font-size: 11px;
            font-weight: normal;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s;
            user-select: none;
            line-height: 1;
        }
        
        .label-light { position: relative; left: 2px; }

        [data-theme="light"] .label-light { color: var(--text-main); }
        [data-theme="light"] .label-dark { color: var(--text-base); }
        [data-theme="dark"] .label-light { color: var(--text-base); }
        [data-theme="dark"] .label-dark { color: var(--text-main); }

        .theme-pill {
            width: 38px;
            height: 20px; 
            border: 2px solid var(--text-base);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .theme-circle {
            width: 12px;
            height: 12px;
            background: var(--text-base);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s, background 0.3s;
            transform: translateX(18px);
        }
        
        [data-theme="light"] .theme-circle { transform: translateX(0px); }

        /* Author Credit */
        .author-credit {
            align-self: center;
            display: inline-block;
            text-align: center;
            font-size: 9px;
            color: var(--text-base);
            letter-spacing: 0.4px; 
            text-transform: uppercase;
            opacity: 0.5;
            transition: opacity 0.3s, color 0.3s;
            user-select: none;
            text-decoration: none; 
            line-height: 1;
        }
        .author-credit:hover { opacity: 1; color: var(--text-main); }

        /* Main Content */
        .main {
            flex: 1; 
            padding: 30px 40px; 
            overflow-y: scroll; 
            position: relative;
            transition: background-color 0.3s;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            margin-bottom: 25px; 
            display: flex; 
            align-items: flex-end; 
            justify-content: space-between;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-dim);
            transition: border-color 0.3s;
        }

        .header-title {
            font-size: 16px;
            font-weight: bold; 
            color: var(--current-color);
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .header-meta, .header-meta a {
            font-size: 9px;
            color: var(--text-base);
            letter-spacing: 0.4px; 
            text-transform: uppercase;
            text-decoration: none;
            opacity: 0.8; 
            transition: opacity 0.2s, color 0.2s;
            font-weight: normal;
            text-align: right;
        }
        .header-meta a:hover { color: var(--text-main); opacity: 1; }

        /* Сетка колонок */
        .grid {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            width: 100%;
        }
        .grid-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }

        /* Категории и элементы */
        .category {
            background: var(--bg-card);
            border: 1px solid var(--current-color);
            border-radius: 6px;
            transition: background-color 0.3s;
            overflow: hidden;
            margin-bottom: 0; 
        }

        .cat-title {
            padding: 10px 14px;
            font-weight: bold; 
            color: var(--current-color);
            border-bottom: 1px solid var(--border-dim);
            background: var(--active-bg); 
            text-transform: uppercase;
            font-size: 11px; letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cat-title::after {
            content: '';
            width: 6px;
            height: 6px;
            border-right: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg);
            transition: transform 0.3s ease;
            margin-right: 4px;
        }

        .category.collapsed .cat-title::after { transform: rotate(-45deg); }
        .category.collapsed .cat-content { display: none; }

        .item {
            position: relative;
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 14px; border-bottom: 1px solid var(--border-dim);
            transition: background 0.2s;
        }
        .item:hover { background: var(--item-hover); }
        .item:last-child { border-bottom: none; }
        
        .item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 2px;
            background-color: var(--current-color);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .item:hover::before { opacity: 1; }

        .item-desc { flex: 1; padding-right: 15px; color: var(--text-main); }
        
        .item-keys {
            color: var(--text-main); 
            background: var(--key-bg);
            border: 1px solid var(--border-dim);
            padding: 4px 8px; border-radius: 4px;
            font-weight: normal;
            white-space: nowrap; font-size: 11px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        
        .item-keys:hover {
            border-color: var(--current-color);
            color: var(--current-color);
        }

        .setting-val { background: transparent; }

        .fav {
            background: none; border: none; color: var(--border-dim); cursor: pointer;
            font-size: 15px; margin-left: 12px; line-height: 1;
            transition: color 0.2s;
            position: relative;
            z-index: 2;
        }
        .fav:hover { color: var(--text-main); }
        .fav.active { color: var(--current-color); }

        /* ИНТЕРФЕЙС ЭКСПОРТА */
        .dvr-ui { padding: 14px; font-family: inherit; }
        .dvr-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-dim); justify-content: center; }
        .dvr-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .dvr-tab { flex: 1; text-align: center; padding: 6px 12px; cursor: pointer; color: var(--text-base); border: 1px solid var(--border-dim); border-radius: 4px; transition: all 0.2s; font-weight: bold; letter-spacing: 0.5px; }
        .dvr-tab:hover { background: var(--item-hover); color: var(--text-main); }
        .dvr-tab.active { border-color: var(--current-color); color: var(--current-color); background: var(--active-bg); }
        .dvr-panel { display: none; }
        .dvr-panel.active { display: block; }
        .dvr-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
        .dvr-label { width: 100px; text-align: right; color: var(--text-base); }
        .dvr-val { flex: 1; background: var(--key-bg); border: 1px solid var(--border-dim); padding: 5px 8px; border-radius: 4px; color: var(--text-main); cursor: text; display: flex; align-items: center; min-height: 24px; }
        .dvr-val:hover { border-color: var(--current-color); }
        .se-flex { display: flex; gap: 20px; }

        .dvr-ctrl { display: flex; align-items: center; gap: 8px; color: var(--text-main); cursor: default; }
        .dvr-ctrl input { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1px solid var(--border-dim); background: var(--key-bg); outline: none; position: relative; display: flex; align-items: center; justify-content: center; margin: 0; transition: border-color 0.2s; }
        .dvr-ctrl input[type="radio"] { border-radius: 50%; }
        .dvr-ctrl input[type="checkbox"] { border-radius: 3px; }
        .dvr-ctrl input:checked { border-color: var(--current-color); }
        .dvr-ctrl input:checked::after { content: ''; position: absolute; background: var(--current-color); }
        .dvr-ctrl input[type="radio"]:checked::after { width: 6px; height: 6px; border-radius: 50%; }
        .dvr-ctrl input[type="checkbox"]:checked::after { width: 6px; height: 6px; border-radius: 1px; }
        .dvr-ctrl.disabled { opacity: 0.5; }

        /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
        @media (max-width: 1024px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                padding: 15px; 
                border-right: none; 
                border-bottom: 1px solid var(--border-dim); 
                flex: none; 
            }
            .brand { justify-content: center; margin-bottom: 15px; }
            .search-box { margin-bottom: 15px; padding: 0; }
            .nav-list { 
                flex-direction: row; 
                overflow-x: auto; 
                overflow-y: hidden; 
                padding-bottom: 5px; 
                margin-bottom: 0;
            }
            .nav-btn { flex: 0 0 auto; padding: 8px 14px; }
            .sidebar-bottom {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 15px 0 0 0;
                margin-top: 10px;
                border-top: 1px solid var(--border-dim);
            }
            .theme-switch-wrapper { border: none; padding: 0; margin: 0; }
            .author-credit { margin: 0; }
            .main { padding: 15px; }
            .header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .header-meta { text-align: left; }
            
            .grid { flex-direction: column; align-items: stretch; gap: 15px; }
            .grid-col { width: 100%; }
            .category { width: 100%; }
            
            .se-flex { flex-direction: column; gap: 15px; }
            .dvr-top { flex-wrap: wrap; gap: 10px; }
        }
    </style>
</head>

        get: function(key, defaultVal) {
            try { 
                var ls = window.localStorage;
                return ls.getItem(key) || defaultVal; 
            } catch(e) { return defaultVal; }
        },
        set: function(key, val) {
            try { 
                window.localStorage.setItem(key, val); 
            } catch(e) {}
        }
    };

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        storage.set('kb_theme', theme);
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
    }

    const savedTheme = storage.get('kb_theme', 'dark');
    setTheme(savedTheme);

            ["Воспроизведение", [
                ["Плей / Пауза", "Space / K"],

                ["Перейти в окно поиска", "/"],
                ["След. / Пред. видео (плейлист)", "Shift + N / P"]

    let favorites = [];
    let collapsedStates = [];
    
    try { 
        let favData = storage.get('kb_fav_data', null);
        if (favData) favorites = JSON.parse(favData);
    } catch(e) {}
    
    try { 
        let colData = storage.get('kb_collapsed_data', null);
        if (colData) collapsedStates = JSON.parse(colData);
    } catch(e) {}
    
    let currentApp = 'tg'; 

    function getCols() {
        if (window.innerWidth <= 1024) return 1;
        if (window.innerWidth <= 1600) return 2;
        return 3;
    }
    
    let currentCols = getCols();
    window.addEventListener('resize', () => {
        const newCols = getCols();
        if (newCols !== currentCols) {
            currentCols = newCols;
            if (document.getElementById('search-input').value.trim()) {
                handleSearch(document.getElementById('search-input').value.trim());
            } else {
                renderMain(currentApp);
            }
        }
    });

    function createGridCols() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const colsCount = getCols();
        for(let i=0; i<colsCount; i++) {
            grid.innerHTML += `<div class="grid-col" id="col-${i}"></div>`;
        }
        return colsCount;
    }

    function init() {
        renderNav();
        renderMain(currentApp);
    }

    function renderNav() {
        const nav = document.getElementById('nav');
        nav.innerHTML = '';
        nav.appendChild(createNavBtn('fav', 'FAVORITES', currentApp === 'fav', 'FV', '#ca8a04'));

        Object.keys(rawData).forEach(key => {
            const app = rawData[key];
            nav.appendChild(createNavBtn(key, app.title, currentApp === key, app.logo, app.color));
        });
    }

    function createNavBtn(id, text, isActive, logoText, color) {
        const btn = document.createElement('button');
        btn.className = `nav-btn ${isActive ? 'active' : ''}`;
        btn.style.setProperty('--app-color', color);
        btn.onclick = () => { 
            document.getElementById('search-input').value = '';
            currentApp = id; 
            renderNav(); 
            renderMain(id); 
        };
        btn.innerHTML = `<div class="nav-left"><div class="logo-box">${logoText}</div><span>${text}</span></div>`;
        return btn;
    }

    function toggleCategory(el, catId) {
        const categoryDiv = el.parentElement;
        categoryDiv.classList.toggle('collapsed');
        
        if (catId) {
            const isCollapsed = categoryDiv.classList.contains('collapsed');
            const idx = collapsedStates.indexOf(catId);
            
            if (isCollapsed && idx === -1) {
                collapsedStates.push(catId);
            } else if (!isCollapsed && idx > -1) {
                collapsedStates.splice(idx, 1);
            }
            storage.set('kb_collapsed_data', JSON.stringify(collapsedStates));
        }
    }

    function toggleFav(btn, event) {
        event.stopPropagation();
        const strId = btn.getAttribute('data-id');
        const idx = favorites.indexOf(strId);
        const isRemoving = idx > -1;

        if (isRemoving) {
            favorites.splice(idx, 1);
            btn.classList.remove('active');
            btn.style.color = '';
        } else {
            favorites.push(strId);
            btn.classList.add('active');
            btn.style.color = 'var(--current-color)';
        }
        storage.set('kb_fav_data', JSON.stringify(favorites));
        
        const searchVal = document.getElementById('search-input').value.trim();
        if (currentApp === 'fav' && !searchVal && isRemoving) {
            const itemDiv = btn.closest('.item');
            const categoryDiv = btn.closest('.category');
            
            if (itemDiv) itemDiv.remove();
            
            if (categoryDiv && categoryDiv.querySelectorAll('.item').length === 0) {
                categoryDiv.remove();
            }
        }
    }

    function copyKey(el) {
        const keyText = el.getAttribute('data-key');
        if (!keyText) return;
        
        navigator.clipboard.writeText(keyText).then(() => {
            const originalText = el.innerHTML;
            el.innerHTML = "Скопировано";
            el.style.color = "var(--current-color)";
            el.style.borderColor = "var(--current-color)";
            
            setTimeout(() => {
                el.innerHTML = originalText;
                el.style.color = "";
                el.style.borderColor = "";
            }, 300);
        });
    }

    function buildCategoryHTML(catId, title, itemsHtml) {
        const isCollapsed = collapsedStates.includes(catId);
        const collapsedClass = isCollapsed ? 'collapsed' : '';
        return `
        <div class="category ${collapsedClass}">
            <div class="cat-title" onclick="toggleCategory(this, '${catId}')">${title}</div>
            <div class="cat-content">${itemsHtml}</div>
        </div>`;
    }

    function buildItem(appId, catName, desc, keys) {
        const strId = `${appId}|${catName}|${desc}`;
        const isFav = favorites.includes(strId);
        const activeFavStyle = isFav ? `style="color: var(--current-color);"` : '';
        const keyClass = (appId === 'ex' || appId === 'fm' || appId === 'fg') ? 'item-keys setting-val' : 'item-keys';
        const showStar = (appId !== 'ex' && appId !== 'fm' && appId !== 'fg');
        
        const starHtml = showStar 
            ? `<button class="fav ${isFav ? 'active' : ''}" ${activeFavStyle} data-id="${strId}" onclick="toggleFav(this, event)">★</button>` 
            : '';
        
        return `
            <div class="item">
                <div class="item-desc">${desc}</div>
                <div class="${keyClass}" data-key="${keys}" onclick="copyKey(this)">${keys}</div>
                ${starHtml}
            </div>`;
    }

    function handleSearch(query) {
        query = query.toLowerCase().trim();
        if (!query) {
            renderMain(currentApp);
            return;
        }
        
        const titleEl = document.getElementById('title');
        const mainArea = document.getElementById('main-area');
        mainArea.style.setProperty('--current-color', '#64748b'); 
        titleEl.innerHTML = `<div class="header-title">>_ ПОИСК: ${query.toUpperCase()}</div>`;

        const colsCount = createGridCols();
        let colIndex = 0;
        let hasResults = false;

        Object.keys(rawData).forEach(appId => {
            const app = rawData[appId];
            let itemsHtml = '';
            
            app.data.forEach(cat => {
                cat[1].forEach(item => {
                    const desc = item[0];
                    const keys = item[1];
                    if (keys === "CUSTOM_UI") {
                        if (desc.toLowerCase().includes(query) || app.title.toLowerCase().includes(query)) {
                            itemsHtml += desc;
                        }
                    } else {
                        if (desc.toLowerCase().includes(query) || keys.toLowerCase().includes(query) || app.title.toLowerCase().includes(query)) {
                            itemsHtml += buildItem(appId, cat[0], desc, keys);
                        }
                    }
                });
            });

            if (itemsHtml) {
                hasResults = true;
                const catId = `search|${appId}`;
                const isCollapsed = collapsedStates.includes(catId);
                const collapsedClass = isCollapsed ? 'collapsed' : '';
                
                const catHtml = `
                <div class="category ${collapsedClass}" style="--current-color: ${app.color}; border-color: ${app.color};">
                    <div class="cat-title" style="color: ${app.color};" onclick="toggleCategory(this, '${catId}')">
                        ${app.title}
                    </div>
                    <div class="cat-content">
                        ${itemsHtml}
                    </div>
                </div>`;
                
                document.getElementById(`col-${colIndex}`).innerHTML += catHtml;
                colIndex = (colIndex + 1) % colsCount;
            }
        });

        if (!hasResults) {
            document.getElementById('grid').innerHTML = `<div style="width:100%; color: var(--text-main);">Ничего не найдено.</div>`;
        }
    }

    function renderMain(id) {
        const titleEl = document.getElementById('title');
        const mainArea = document.getElementById('main-area');

        if (id === 'fav') {
            mainArea.style.setProperty('--current-color', '#ca8a04');
            const metaHtml = '<span class="header-meta">ОТМЕЧАЙТЕ НУЖНЫЕ КОМАНДЫ ЗВЕЗДОЧКОЙ</span>';
            titleEl.innerHTML = `<div class="header-title">>_ FAVORITES</div>${metaHtml}`;
            
            if (!favorites.length) {
                document.getElementById('grid').innerHTML = '';
                return;
            }

            const colsCount = createGridCols();
            let colIndex = 0;
            let favGroups = {};
            
            favorites.forEach(strId => {
                const parts = strId.split('|');
                if(parts.length === 3) {
                    const appId = parts[0];
                    if (!favGroups[appId]) favGroups[appId] = [];
                    favGroups[appId].push(strId);
                }
            });

            Object.keys(favGroups).forEach(appId => {
                const app = rawData[appId];
                if(!app) return;
                
                let itemsHtml = '';
                favGroups[appId].forEach(strId => {
                    const [_, catName, desc] = strId.split('|');
                    const catData = app.data.find(c => c[0] === catName);
                    if(catData) {
                        const itemData = catData[1].find(i => i[0] === desc);
                        if(itemData) {
                            const keys = itemData[1];
                            itemsHtml += buildItem(appId, catName, desc, keys);
                        }
                    }
                });
                
                if(itemsHtml) {
                    const catId = `fav|${appId}`;
                    const isCollapsed = collapsedStates.includes(catId);
                    const collapsedClass = isCollapsed ? 'collapsed' : '';
                    
                    const catHtml = `
                    <div class="category ${collapsedClass}" style="--current-color: ${app.color}; border-color: ${app.color};">
                        <div class="cat-title" style="color:${app.color};" onclick="toggleCategory(this, '${catId}')">
                            ${app.title}
                        </div>
                        <div class="cat-content">
                            ${itemsHtml}
                        </div>
                    </div>`;
                    
                    document.getElementById(`col-${colIndex}`).innerHTML += catHtml;
                    colIndex = (colIndex + 1) % colsCount;
                }
            });
            return;
        }

        const app = rawData[id];
        mainArea.style.setProperty('--current-color', app.color);
        
        let metaHtml = '';
        if(app.meta) {
            metaHtml = `<span class="header-meta">${app.meta}</span>`;
        }
        titleEl.innerHTML = `<div class="header-title">>_ ${app.title}</div>${metaHtml}`;
        
        const colsCount = createGridCols();
        let colIndex = 0;

        if(app.data) {
            app.data.forEach(cat => {
                let itemsHtml = '';
                cat[1].forEach(item => {
                    if (item[1] === "CUSTOM_UI") {
                        itemsHtml += item[0];
                    } else {
                        itemsHtml += buildItem(id, cat[0], item[0], item[1]);
                    }
                });
                const catId = `${id}|${cat[0]}`;
                const catHtml = buildCategoryHTML(catId, cat[0], itemsHtml);
                
                document.getElementById(`col-${colIndex}`).innerHTML += catHtml;
                colIndex = (colIndex + 1) % colsCount;
            });
        }
    }

    // Жесткий старт без привязки к onload
    init();

</script>
