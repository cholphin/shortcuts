<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Dmitrii Titaev">
    <title>Software Shortcuts Pro</title>
    <style>
        :root {
            --bg-main: #0b0f19;     
            --bg-panel: #0d1321;    
            --bg-card: #131c2f;     
            --border-dim: #1e293b;  
            --text-base: #64748b;   
            --text-main: #d4d4d4;   
            --key-bg: #1e293b;
            --active-bg: rgba(255,255,255,0.04);
            --item-hover: rgba(255,255,255,0.02);
            --color-win: #38bdf8;
            --color-mac: #a1a1aa;
            --btn-width: 135px;
        }

        [data-theme="light"] {
            --bg-main: #f8fafc;     
            --bg-panel: #ffffff;    
            --bg-card: #ffffff;     
            --border-dim: #cbd5e1;  
            --text-base: #64748b;   
            --text-main: #333333;   
            --key-bg: #f1f5f9; 
            --active-bg: rgba(0,0,0,0.03);
            --item-hover: rgba(0,0,0,0.02);
            --color-win: #0284c7;
            --color-mac: #71717a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: Tahoma, "MS Sans Serif", sans-serif;
            font-weight: normal;
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-size: 11px;
            -webkit-font-smoothing: none; 
            font-smooth: never;
            text-rendering: crispEdges; 
            transition: background-color 0.3s, color 0.3s;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-base); }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            padding: 11px 15px 60px 15px; 
            z-index: 10;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .brand-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            height: 16px;
            margin-bottom: 15px; 
            padding: 0 11px 0 5px; 
        }

        .brand {
            font-size: 16px;
            line-height: 16px;
            color: var(--text-main);
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lang-switch {
            display: flex;
            gap: 6px;
            font-size: 16px;
            line-height: 16px;
            letter-spacing: 1px;
            color: var(--text-base);
            margin-right: -1px;
        }

        .lang-btn { cursor: pointer; transition: color 0.2s; }
        .lang-btn:hover, .lang-btn.active { color: var(--text-main); }
        .lang-sep { opacity: 0.4; cursor: default; }

        .search-box { margin-bottom: 15px; padding: 0 11px 0 5px; } 
        .search-input {
            width: 100%; 
            height: 32px; 
            background: var(--bg-main);
            border: 1px solid var(--border-dim); color: var(--text-main);
            padding: 0 10px; border-radius: 6px; font-family: inherit;
            font-size: 11px; outline: none; transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--text-base); }
        .search-input::placeholder { color: var(--text-base); }

        .nav-list { flex: 1; overflow-y: scroll; overflow-x: hidden; display: flex; flex-direction: column; gap: 2px; padding: 0 5px; }
        .nav-btn {
            background: transparent; border: 1px solid transparent; color: var(--text-base);
            height: 32px; 
            padding: 0 10px; border-radius: 6px; cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            display: flex; align-items: center; font-family: inherit;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .nav-btn:hover { background: var(--item-hover); color: var(--text-main); }
        .nav-btn.active { background: var(--active-bg); border-color: var(--border-dim); color: var(--app-color); }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        
        .logo-box { 
            font-weight: normal; font-size: 11px; letter-spacing: 0; color: inherit; 
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; 
            line-height: 1; border: 1px solid currentColor; border-radius: 4px; transition: opacity 0.2s; opacity: 0.8; 
            box-sizing: border-box;
        }
        .nav-btn:hover .logo-box, .nav-btn.active .logo-box { opacity: 1; }

        .sidebar-bottom { margin-top: auto; padding-top: 15px; display: flex; flex-direction: column; gap: 15px; }
        .theme-switch-wrapper { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 15px 5px 0 5px; border-top: 1px solid var(--border-dim); color: var(--text-base); }
        .theme-label { text-align: center; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: color 0.3s; user-select: none; line-height: 1; }
        .label-light { position: relative; left: 2px; }
        [data-theme="light"] .label-light { color: var(--text-main); }
        [data-theme="light"] .label-dark { color: var(--text-base); }
        [data-theme="dark"] .label-light { color: var(--text-base); }
        [data-theme="dark"] .label-dark { color: var(--text-main); }

        .theme-pill { width: 38px; height: 20px; border: 2px solid var(--text-base); border-radius: 10px; position: relative; cursor: pointer; transition: border-color 0.3s; }
        .theme-circle { width: 12px; height: 12px; background: var(--text-base); border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.3s, background 0.3s; transform: translateX(18px); }
        [data-theme="light"] .theme-circle { transform: translateX(0px); }

        .author-credit { 
            align-self: center; text-align: center; font-size: 9px; color: var(--text-base); 
            letter-spacing: 0.4px; text-transform: uppercase; opacity: 0.5; transition: opacity 0.3s, color 0.3s; 
            user-select: none; text-decoration: none; line-height: 1; 
            transform: translateY(-1px); 
        }
        .author-credit:hover { opacity: 1; color: var(--text-main); }

        .main { flex: 1; padding: 11px 30px 30px 30px; overflow-y: scroll; position: relative; transition: background-color 0.3s; -webkit-overflow-scrolling: touch; }
        
        .header { 
            position: relative;
            display: block; 
            height: 16px; 
            margin-bottom: 15px; 
            padding-bottom: 0;
            border-bottom: none; 
            box-sizing: border-box; 
        }
        
        .header-left { 
            position: absolute;
            top: 0; left: 0; 
            display: flex; align-items: baseline; gap: 20px; 
            height: 16px; 
        }
        
        .header-title { font-size: 16px; line-height: 16px; font-weight: normal; color: var(--current-color); text-transform: uppercase; letter-spacing: 1px; }
        
        .os-switch { font-size: 16px; line-height: 16px; letter-spacing: 1px; color: var(--current-color); display: flex; gap: 6px; }
        .os-btn { cursor: pointer; opacity: 0.4; transition: opacity 0.2s; }
        .os-btn:hover, .os-btn.active { opacity: 1; }
        .os-switch.static .os-btn { opacity: 1; cursor: default; }
        .os-sep { opacity: 0.4; cursor: default; }

        .header-meta { 
            position: absolute;
            top: 16px; 
            left: 0;   
            font-size: 10px; 
            color: var(--text-base); letter-spacing: 0.5px; text-transform: uppercase; text-decoration: none; opacity: 0.8; transition: opacity 0.2s, color 0.2s; font-weight: normal; text-align: left; 
            white-space: nowrap;
        }
        .header-meta a { color: inherit; text-decoration: none; transition: color 0.2s; }
        .header-meta a:hover { color: var(--text-main); opacity: 1; }

        .grid { display: flex; gap: 15px; align-items: flex-start; width: 100%; } 
        .grid-col { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; } 

        .category { background: var(--bg-card); border: 1px solid var(--current-color); border-radius: 6px; transition: background-color 0.3s; overflow: hidden; margin-bottom: 0; min-width: 0; }
        
        .cat-title { 
            display: flex; align-items: center; justify-content: space-between; 
            height: 32px; padding: 0 14px; 
            font-weight: normal; color: var(--current-color); border-bottom: 1px solid var(--border-dim); 
            background: var(--active-bg); text-transform: uppercase; font-size: 11px; letter-spacing: 1px; 
            cursor: pointer; user-select: none; position: relative; min-width: 0; 
        }
        .cat-name { flex: 1; padding-right: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
        .cat-title::after { content: ''; position: absolute; right: 14px; top: 50%; margin-top: -3px; width: 6px; height: 6px; border-right: 2px solid currentColor; border-bottom: 2px solid currentColor; transform: rotate(45deg); transition: transform 0.3s ease; }
        .category.collapsed .cat-title::after { transform: rotate(-45deg); }
        .category.collapsed .cat-content { display: none; }

        .item { 
            position: relative; display: flex; align-items: center; justify-content: space-between; 
            height: 32px; padding: 0 14px; 
            border-bottom: 1px solid var(--border-dim); transition: background 0.2s; min-width: 0; 
        }
        .item:hover { background: var(--item-hover); }
        .item:last-child { border-bottom: none; }
        .item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background-color: var(--current-color); opacity: 0; transition: opacity 0.2s; }
        .item:hover::before { opacity: 1; }

        .item-desc { flex: 1; padding-right: 15px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
        .item-shortcuts { display: flex; gap: 8px; flex-shrink: 0; }
        .item-keys { width: var(--btn-width); height: 20px; color: var(--text-main); background: var(--key-bg); border: 1px solid var(--border-dim); padding: 0 6px; border-radius: 4px; font-weight: normal; white-space: nowrap; font-size: 10px; cursor: pointer; transition: color 0.2s, border-color 0.2s; display: flex; align-items: center; justify-content: center; }
        .item-keys:hover { border-color: var(--current-color); color: var(--current-color); }
        .setting-val { width: auto; min-width: var(--btn-width); background: transparent; font-size: 11px; }

        .fav { width: 20px; flex-shrink: 0; background: none; border: none; color: var(--border-dim); cursor: pointer; font-size: 15px; text-align: right; line-height: 1; transition: color 0.2s; position: relative; z-index: 2; margin-left: 8px; }
        .fav:hover { color: var(--text-main); }
        .fav.active { color: var(--current-color); }

        /* ИНТЕРФЕЙС ЭКСПОРТА И ВНЕШНИЕ ТАБЫ */
        .dvr-ui { padding: 14px; font-family: inherit; }
        .dvr-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-dim); justify-content: center; }
        .dvr-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .dvr-tab { flex: 1; text-align: center; padding: 6px 12px; cursor: pointer; color: var(--text-base); border: 1px solid var(--border-dim); border-radius: 4px; transition: all 0.2s; font-weight: normal; letter-spacing: 0.5px; }
        .dvr-tab:hover { background: var(--item-hover); color: var(--text-main); }
        .dvr-tab.active { border-color: var(--current-color); color: var(--current-color); background: var(--active-bg); }
        .dvr-panel { display: none; }
        .dvr-panel.active { display: block; }
        .dvr-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
        .dvr-label { width: 100px; text-align: right; color: var(--text-base); }
        .dvr-val { flex: 1; background: var(--key-bg); border: 1px solid var(--border-dim); padding: 5px 8px; border-radius: 4px; color: var(--text-main); cursor: text; display: flex; align-items: center; min-height: 24px; }
        .dvr-val:hover { border-color: var(--current-color); }
        .se-flex { display: flex; gap: 20px; }
        .dvr-ctrl { display: flex; align-items: center; gap: 8px; color: var(--text-main); cursor: default; }
        .dvr-ctrl input { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1px solid var(--border-dim); background: var(--key-bg); outline: none; position: relative; display: flex; align-items: center; justify-content: center; margin: 0; transition: border-color 0.2s; }
        .dvr-ctrl input[type="radio"] { border-radius: 50%; }
        .dvr-ctrl input[type="checkbox"] { border-radius: 3px; }
        .dvr-ctrl input:checked { border-color: var(--current-color); }
        .dvr-ctrl input:checked::after { content: ''; position: absolute; background: var(--current-color); }
        .dvr-ctrl input[type="radio"]:checked::after { width: 6px; height: 6px; border-radius: 50%; }
        .dvr-ctrl input[type="checkbox"]:checked::after { width: 6px; height: 6px; border-radius: 1px; }
        .dvr-ctrl.disabled { opacity: 0.5; }

        /* ИНТЕРАКТИВНАЯ МАШИНА STORY ARCHITECT */
        .sa-machine { padding: 14px; display: flex; flex-direction: column; gap: 4px; }
        .sa-scroll-wrap { overflow-x: auto; padding-bottom: 5px; }
        .sa-grid { min-width: 400px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .sa-btn { height: 32px; border: 1px solid var(--border-dim); background: var(--key-bg); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-main); cursor: pointer; transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px; user-select: none; }
        .sa-btn.sa-head { background: transparent; border-color: transparent; color: var(--text-base); font-size: 10px; cursor: default; }
        .sa-btn.sa-head.sa-action { border-color: var(--border-dim); cursor: pointer; }
        .sa-btn.sa-head.sa-action:hover { border-color: var(--current-color); color: var(--text-main); background: var(--item-hover); }
        .sa-row { display: contents; } 
        .sa-row:not(.active) .sa-btn:not(.sa-head) { opacity: 0.4; }
        .sa-row:not(.active):hover .sa-btn:not(.sa-head) { opacity: 1; }
        .sa-row.active .sa-btn-primary { background: var(--current-color); border-color: var(--current-color); color: var(--bg-main); font-weight: bold; opacity: 1; }
        .sa-btn:hover:not(.sa-head):not(.sa-btn-primary) { border-color: var(--current-color); color: var(--current-color); }

        /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
        @media (max-width: 1024px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; border-right: none; border-bottom: 1px solid var(--border-dim); flex: none; }
            .brand-header { margin-bottom: 15px; padding: 0; justify-content: space-between; }
            .search-box { margin-bottom: 15px; padding: 0; }
            .nav-list { flex-direction: row; overflow-x: auto; overflow-y: hidden; padding: 0 0 5px 0; margin-bottom: 0; }
            .nav-btn { flex: 0 0 auto; padding: 8px 14px; }
            .sidebar-bottom { flex-direction: row; justify-content: space-between; align-items: center; padding: 15px 0 0 0; margin-top: 10px; border-top: 1px solid var(--border-dim); }
            .theme-switch-wrapper { border: none; padding: 0; margin: 0; }
            .author-credit { margin: 0; transform: none; }
            .main { padding: 15px; }
            .header { height: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; margin-bottom: 15px; border-bottom: 1px solid var(--border-dim); padding-bottom: 10px; }
            .header-left { position: relative; top: auto; left: auto; display: flex; flex-direction: column; gap: 8px; height: auto; align-items: flex-start; }
            .header-meta { position: relative; top: auto; left: auto; text-align: left; align-self: flex-start; white-space: normal; }
            .grid { flex-direction: column; align-items: stretch; gap: 15px; }
            .grid-col { width: 100%; }
            .category { width: 100%; }
            .se-flex { flex-direction: column; gap: 15px; }
            .dvr-top { flex-wrap: wrap; gap: 10px; }
        }

        @media (max-width: 600px) {
            :root { --btn-width: 95px; }
            .item-keys { font-size: 9px; padding: 4px; }
            .item-desc { padding-right: 8px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-header">
            <div class="brand">SOFTWARE</div>
            <div class="lang-switch">
                <span class="lang-btn active" id="lang-ru" onclick="setLang('ru')">RU</span>
                <span class="lang-sep">|</span>
                <span class="lang-btn" id="lang-en" onclick="setLang('en')">EN</span>
            </div>
        </div>
        <div class="search-box"><input type="text" class="search-input" id="search-input" placeholder="ПОИСК..." oninput="handleSearch(this.value)"></div>
        <div class="nav-list" id="nav"></div>
        <div class="sidebar-bottom">
            <div class="theme-switch-wrapper">
                <div class="theme-label label-light" onclick="setTheme('light')">LIGHT</div>
                <div class="theme-pill" onclick="toggleTheme()"><div class="theme-circle"></div></div>
                <div class="theme-label label-dark" onclick="setTheme('dark')">DARK</div>
            </div>
            <a href="https://t.me/titamedia" target="_blank" rel="noopener noreferrer" class="author-credit">CREATED BY DMITRII TITAEV</a>
        </div>
    </div>

    <div class="main" id="main-area">
        <div class="header" id="title"></div>
        <div class="grid" id="grid"></div>
    </div>

<script>
    const storage = {
        get: function(key, defaultVal) { try { return window.localStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; } },
        set: function(key, val) { try { window.localStorage.setItem(key, val); } catch(e) {} }
    };

    let currentLang = storage.get('kb_lang_v2', 'ru');
    let currentOS = storage.get('kb_os', 'win');

    function setLang(lang) {
        currentLang = lang;
        storage.set('kb_lang_v2', lang);
        document.getElementById('lang-ru').classList.toggle('active', lang === 'ru');
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        document.getElementById('search-input').placeholder = lang === 'ru' ? 'ПОИСК...' : 'SEARCH...';
        
        renderNav();
        const searchVal = document.getElementById('search-input').value.trim();
        if (searchVal) handleSearch(searchVal);
        else renderMain(currentApp);
    }

    function setOS(os) {
        currentOS = os;
        storage.set('kb_os', os);
        const searchVal = document.getElementById('search-input').value.trim();
        if (searchVal) handleSearch(searchVal);
        else renderMain(currentApp);
    }

    document.getElementById('lang-ru').classList.toggle('active', currentLang === 'ru');
    document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
    document.getElementById('search-input').placeholder = currentLang === 'ru' ? 'ПОИСК...' : 'SEARCH...';

    function setTheme(theme) { document.documentElement.setAttribute('data-theme', theme); storage.set('kb_theme', theme); }
    function toggleTheme() { setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    setTheme(storage.get('kb_theme', 'dark'));

    function switchDvrTab(btn, tabClass) {
        const ui = btn.closest('.dvr-ui');
        ui.querySelectorAll('.dvr-tab').forEach(t => t.classList.remove('active'));
        ui.querySelectorAll('.dvr-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        ui.querySelector('.' + tabClass).classList.add('active');
    }

    /* БАЗА ДАННЫХ ИНТЕРАКТИВНОЙ МАШИНЫ STORY ARCHITECT */
    const saLogicDB = {
        text: {
            keys: ['h1','h2','h3','h4','h5','h6','txt','note'],
            ru: ['H1','H2','H3','H4','H5','H6','Текст','Заметка'],
            en: ['H1','H2','H3','H4','H5','H6','Text','Note'],
            flow: {
                'h1': ['h2','txt','h2','h1'], 'h2': ['h3','txt','h3','h1'], 'h3': ['h4','txt','h4','h2'],
                'h4': ['h5','txt','h5','h3'], 'h5': ['h6','txt','h6','h4'], 'h6': ['txt','txt','txt','h5'],
                'txt': ['txt','txt','note','h6'], 'note': ['txt','txt','txt','note']
            }
        },
        screenplay: {
            keys: ['head','char_list','beat','action','char','paren','dial','lyric','shot','trans','note','ptxt','group','act'],
            ru: ['Сцена','Участники','Бит','Действие','Персонаж','Ремарка','Реплика','Лирика','Кадр','Переход','Заметка','Пр. текст','Группа','Акт'],
            en: ['Scene','Char List','Beat','Action','Character','Paren','Dialogue','Lyric','Shot','Trans','Note','Text','Group','Act'],
            flow: {
                'head': ['char_list','action','action','head'], 'char_list': ['action','action','action','action'],
                'beat': ['action','action','action','action'], 'action': ['char','action','char','head'],
                'char': ['paren','dial','action','action'], 'paren': ['dial','dial','dial','paren'],
                'dial': ['paren','action','paren','action'], 'lyric': ['paren','action','paren','action'],
                'shot': ['action','action','action','shot'], 'trans': ['head','head','action','trans'],
                'note': ['action','action','note','note'], 'ptxt': ['ptxt','ptxt','ptxt','ptxt'],
                'group': ['head','head','head','act'], 'act': ['group','head','group','act']
            }
        },
        comic: {
            keys: ['page','panel','desc','char','dial','note','ptxt'],
            ru: ['Страница','Кадр','Описание','Персонаж','Реплика','Заметка','Пр. текст'],
            en: ['Page','Panel','Desc','Character','Dialogue','Note','Text'],
            flow: {
                'page': ['panel','panel','panel','page'], 'panel': ['char','desc','desc','page'],
                'desc': ['char','desc','char','panel'], 'char': ['dial','dial','desc','desc'],
                'dial': ['char','desc','char','desc'], 'note': ['desc','desc','note','note'],
                'ptxt': ['ptxt','ptxt','ptxt','ptxt']
            }
        },
        audio: {
            keys: ['head','char','dial','sound','music','cue','note','ptxt'],
            ru: ['Сцена','Персонаж','Реплика','Звук','Музыка','Сигнал','Заметка','Пр. текст'],
            en: ['Scene','Character','Dialogue','Sound','Music','Cue','Note','Text'],
            flow: {
                'head': ['cue','char','char','char'], 'char': ['dial','dial','sound','head'],
                'dial': ['cue','char','sound','head'], 'sound': ['music','char','music','head'],
                'music': ['sound','char','cue','head'], 'cue': ['head','char','char','head'],
                'note': ['char','char','char','char'], 'ptxt': ['ptxt','ptxt','char','char']
            }
        },
        play: {
            keys: ['head','char','paren','dial','action','note','ptxt'],

    let activeSATab = 'text';

    function switchSATab(btn, tabId) {
        const ui = btn.closest('.dvr-ui');
        ui.querySelectorAll('.dvr-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        activeSATab = tabId;
        renderSAMachine();
    }

    function saAction(actionIdx) {
        const currentState = activeSAStates[activeSATab];
        const nextState = saLogicDB[activeSATab].flow[currentState][actionIdx];
        activeSAStates[activeSATab] = nextState;
        renderSAMachine();
    }

    function saSetState(stateKey) {
        activeSAStates[activeSATab] = stateKey;
        renderSAMachine();
    }

    function renderSAMachine() {
        const root = document.getElementById('sa-machine-root');
        if (!root) return;

        const db = saLogicDB[activeSATab];
        const langArr = currentLang === 'ru' ? db.ru : db.en;
        const currentState = activeSAStates[activeSATab];
        const enterKeyText = currentOS === 'mac' ? 'RETURN' : 'ENTER';
        
        let headerRow = '';
        if (currentLang === 'ru') {
            headerRow = `<div class="sa-btn sa-head">ЭЛЕМЕНТ</div><div class="sa-btn sa-head sa-action" onclick="saAction(0)">⇥ текст</div><div class="sa-btn sa-head sa-action" onclick="saAction(1)">↵ текст</div><div class="sa-btn sa-head sa-action" onclick="saAction(2)">⇥ пусто</div><div class="sa-btn sa-head sa-action" onclick="saAction(3)">↵ пусто</div>`;
        } else {
            headerRow = `<div class="sa-btn sa-head">ELEMENT</div><div class="sa-btn sa-head sa-action" onclick="saAction(0)">⇥ text</div><div class="sa-btn sa-head sa-action" onclick="saAction(1)">↵ text</div><div class="sa-btn sa-head sa-action" onclick="saAction(2)">⇥ empty</div><div class="sa-btn sa-head sa-action" onclick="saAction(3)">↵ empty</div>`;
        }

        let rowsHtml = '';
        db.keys.forEach((key, idx) => {
            const isActive = key === currentState ? 'active' : '';
            const primaryName = langArr[idx];
            
            const target0Name = langArr[db.keys.indexOf(db.flow[key][0])];
            const target1Name = langArr[db.keys.indexOf(db.flow[key][1])];
            const target2Name = langArr[db.keys.indexOf(db.flow[key][2])];
            const target3Name = langArr[db.keys.indexOf(db.flow[key][3])];

            rowsHtml += `
                <div class="sa-row ${isActive}">
                    <div class="sa-btn sa-btn-primary" onclick="saSetState('${key}')">${primaryName}</div>
                    <div class="sa-btn" onclick="saSetState('${db.flow[key][0]}')">${target0Name}</div>
                    <div class="sa-btn" onclick="saSetState('${db.flow[key][1]}')">${target1Name}</div>
                    <div class="sa-btn" onclick="saSetState('${db.flow[key][2]}')">${target2Name}</div>

            `;

        const tabText = currentLang === 'ru' ? ['ТЕКСТ', 'СЦЕНАРИЙ', 'КОМИКС', 'АУДИО', 'ПЬЕСА', 'РОМАН'] : ['TEXT', 'SCREENPLAY', 'COMIC', 'AUDIO', 'PLAY', 'NOVEL'];

                    <div class="dvr-tab ${activeSATab === 'text' ? 'active' : ''}" onclick="switchSATab(this, 'text')">${tabText[0]}</div>

                    <div class="dvr-tab ${activeSATab === 'comic' ? 'active' : ''}" onclick="switchSATab(this, 'comic')">${tabText[2]}</div>
                    <div class="dvr-tab ${activeSATab === 'audio' ? 'active' : ''}" onclick="switchSATab(this, 'audio')">${tabText[3]}</div>
                    <div class="dvr-tab ${activeSATab === 'play' ? 'active' : ''}" onclick="switchSATab(this, 'play')">${tabText[4]}</div>
                    <div class="dvr-tab ${activeSATab === 'novel' ? 'active' : ''}" onclick="switchSATab(this, 'novel')">${tabText[5]}</div>
                </div>
                <div class="sa-scroll-wrap">
                    <div class="sa-grid">
                        ${headerRow}
                        ${rowsHtml}
                    </div>
                </div>
            </div>
        `;
    }

    let currentApp = 'ae'; // Старт с первой буквы по алфавиту

    function getCols() {
        if (window.innerWidth <= 1024) return 1;
        if (window.innerWidth <= 1600) return 2;
        return 3;
    }
    
    let currentCols = getCols();
    window.addEventListener('resize', () => {
        const newCols = getCols();
        if (newCols !== currentCols) {
            currentCols = newCols;
            if (document.getElementById('search-input').value.trim()) {
                handleSearch(document.getElementById('search-input').value.trim());
            } else {
                renderMain(currentApp);
            }
        }
    });

    function createGridCols() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const colsCount = getCols();
        for(let i=0; i<colsCount; i++) {
            grid.innerHTML += `<div class="grid-col" id="col-${i}"></div>`;
        }
        return colsCount;
    }

    function renderNav() {
        const nav = document.getElementById('nav');
        nav.innerHTML = '';
        nav.appendChild(createNavBtn('fav', currentLang === 'ru' ? 'ИЗБРАННОЕ' : 'FAVORITES', currentApp === 'fav', 'FV', '#ca8a04'));

        Object.keys(rawData).forEach(key => {
            const app = rawData[key];
            nav.appendChild(createNavBtn(key, app.title, currentApp === key, app.logo, app.color));
        });
    }

    function createNavBtn(id, text, isActive, logoText, color) {
        const btn = document.createElement('button');
        btn.className = `nav-btn ${isActive ? 'active' : ''}`;
        btn.style.setProperty('--app-color', color);
        btn.onclick = () => { 
            document.getElementById('search-input').value = '';
            currentApp = id; 
            renderNav(); 
            renderMain(id); 
        };
        btn.innerHTML = `<div class="nav-left"><div class="logo-box">${logoText}</div><span>${text}</span></div>`;
        return btn;
    }

    function toggleCategory(el, catId) {
        const categoryDiv = el.parentElement;
        categoryDiv.classList.toggle('collapsed');
        
        if (catId) {
            const isCollapsed = categoryDiv.classList.contains('collapsed');
            const idx = collapsedStates.indexOf(catId);
            if (isCollapsed && idx === -1) collapsedStates.push(catId);
            else if (!isCollapsed && idx > -1) collapsedStates.splice(idx, 1);
            storage.set('kb_collapsed_data_v2', JSON.stringify(collapsedStates));
        }
    }

    function toggleFav(btn, event) {
        event.stopPropagation();
        const strId = btn.getAttribute('data-id');
        const idx = favorites.indexOf(strId);
        const isRemoving = idx > -1;

        if (isRemoving) {
            favorites.splice(idx, 1);
            btn.classList.remove('active');
            btn.style.color = '';
        } else {
            favorites.push(strId);
            btn.classList.add('active');
            btn.style.color = 'var(--current-color)';
        }
        storage.set('kb_fav_data_v2', JSON.stringify(favorites));
        
        const searchVal = document.getElementById('search-input').value.trim();
        if (currentApp === 'fav' && !searchVal && isRemoving) {
            const itemDiv = btn.closest('.item');
            const categoryDiv = btn.closest('.category');
            if (itemDiv) itemDiv.remove();
            if (categoryDiv && categoryDiv.querySelectorAll('.item').length === 0) categoryDiv.remove();
        }
    }

    function copyKey(el) {
        const keyText = el.getAttribute('data-key');
        if (!keyText) return;
        
        navigator.clipboard.writeText(keyText).then(() => {
            const originalText = el.innerHTML;
            el.innerHTML = currentLang === 'ru' ? "Скопировано" : "Copied";
            el.style.color = "var(--current-color)";
            el.style.borderColor = "var(--current-color)";
            setTimeout(() => { el.innerHTML = originalText; el.style.color = ""; el.style.borderColor = ""; }, 300);
        });
    }

    function buildCategoryHTML(catId, title, itemsHtml) {
        const isCollapsed = collapsedStates.includes(catId);
        const collapsedClass = isCollapsed ? 'collapsed' : '';
        return `
        <div class="category ${collapsedClass}">
            <div class="cat-title" onclick="toggleCategory(this, '${catId}')">
                <div class="cat-name" title="${title}">${title}</div>
            </div>
            <div class="cat-content">${itemsHtml}</div>
        </div>`;
    }

    function buildItem(appId, catEN, descRU, descEN, keysWin, keysMac) {
        const strId = `${appId}|${catEN}|${descEN}`;
        const isFav = favorites.includes(strId);
        const activeFavStyle = isFav ? `style="color: var(--current-color);"` : '';
        
        if (keysWin === "CUSTOM_UI" || keysWin === "CUSTOM_UI_SA") {
            return currentLang === 'ru' ? descRU : descEN;
        }

        const isWinOnly = ['np', 'tc', 'pp'].includes(appId);
        let activeKey = keysWin;
        if (!isWinOnly && currentOS === 'mac' && keysMac !== undefined) {
            activeKey = keysMac;
        }

        const isSettings = (appId === 'ex' || appId === 'fm' || appId === 'fg');
        const keyClass = isSettings ? 'item-keys setting-val' : 'item-keys';
        const showStar = !isSettings;
        
        const starHtml = showStar 
            ? `<button class="fav ${isFav ? 'active' : ''}" ${activeFavStyle} data-id="${strId}" onclick="toggleFav(this, event)">★</button>` 
            : '';
        
        let keysHtml = `<div class="${keyClass}" data-key="${activeKey}" onclick="copyKey(this)">${activeKey}</div>`;
        const displayDesc = currentLang === 'ru' ? descRU : descEN;

        return `
            <div class="item">
                <div class="item-desc" title="${displayDesc}">${displayDesc}</div>
                <div class="item-shortcuts">${keysHtml}</div>
                ${starHtml}
            </div>`;
    }

    function handleSearch(query) {
        query = query.toLowerCase().trim();
        if (!query) { renderMain(currentApp); return; }
        
        const titleEl = document.getElementById('title');
        const mainArea = document.getElementById('main-area');
        mainArea.style.setProperty('--current-color', '#64748b'); 
        
        let osHtml = `
            <div class="os-switch">
                <span class="os-btn ${currentOS === 'win' ? 'active' : ''}" onclick="setOS('win')">WIN</span>
                <span class="os-sep">/</span>
                <span class="os-btn ${currentOS === 'mac' ? 'active' : ''}" onclick="setOS('mac')">MAC</span>
            </div>
        `;
        
        titleEl.innerHTML = `
            <div class="header-left">
                <div class="header-title">${currentLang === 'ru' ? 'ПОИСК:' : 'SEARCH:'} ${query.toUpperCase()}</div>
                ${osHtml}
            </div>
        `;

        const colsCount = createGridCols();
        let colIndex = 0;
        let hasResults = false;

        Object.keys(rawData).forEach(appId => {
            const app = rawData[appId];
            let itemsHtml = '';
            const isWinOnly = ['np', 'tc', 'pp'].includes(appId);
            
            app.data.forEach(cat => {
                cat[2].forEach(item => {
                    const descRU = item[0];
                    const descEN = item[1];
                    const keysWin = item[2];
                    const keysMac = item[3];
                    const displayDesc = currentLang === 'ru' ? descRU : descEN;
                    
                    let targetKey = keysWin;
                    if (!isWinOnly && currentOS === 'mac' && keysMac !== undefined) targetKey = keysMac;

                    if (keysWin === "CUSTOM_UI" || keysWin === "CUSTOM_UI_SA") {
                        if (displayDesc.toLowerCase().includes(query) || app.title.toLowerCase().includes(query)) {
                            itemsHtml += `<div id="${keysWin === "CUSTOM_UI_SA" ? "sa-machine-root" : ""}"></div>`;
                            if (keysWin === "CUSTOM_UI_SA") setTimeout(renderSAMachine, 0);
                            else itemsHtml += displayDesc;
                        }
                    } else {
                        const matchDesc = displayDesc.toLowerCase().includes(query);
                        const matchKey = targetKey.toLowerCase().includes(query);
                        const matchApp = app.title.toLowerCase().includes(query);
                        
                        if (matchDesc || matchKey || matchApp) {
                            itemsHtml += buildItem(appId, cat[1], descRU, descEN, keysWin, keysMac);
                        }
                    }
                });
            });

            if (itemsHtml) {
                hasResults = true;
                const catId = `search|${appId}`;
                const isCollapsed = collapsedStates.includes(catId);
                const collapsedClass = isCollapsed ? 'collapsed' : '';
                
                const catHtml = `
                <div class="category ${collapsedClass}" style="--current-color: ${app.color}; border-color: ${app.color};">
                    <div class="cat-title" style="color: ${app.color};" onclick="toggleCategory(this, '${catId}')">
                        <div class="cat-name">${app.title}</div>
                    </div>
                    <div class="cat-content">
                        ${itemsHtml}
                    </div>
                </div>`;
                
                document.getElementById(`col-${colIndex}`).innerHTML += catHtml;
                colIndex = (colIndex + 1) % colsCount;
            }
        });

        if (!hasResults) document.getElementById('grid').innerHTML = `<div style="width:100%; color: var(--text-main);">${currentLang === 'ru' ? 'Ничего не найдено.' : 'No results found.'}</div>`;
    }

    function renderMain(id) {
        const titleEl = document.getElementById('title');
        const mainArea = document.getElementById('main-area');

        if (id === 'fav') {
            mainArea.style.setProperty('--current-color', '#ca8a04');
            const metaStr = currentLang === 'ru' ? 'ОТМЕЧАЙТЕ НУЖНЫЕ КОМАНДЫ ЗВЕЗДОЧКОЙ' : 'MARK YOUR WORKFLOW SHORTCUTS';
            let osHtml = `
                <div class="os-switch">
                    <span class="os-btn ${currentOS === 'win' ? 'active' : ''}" onclick="setOS('win')">WIN</span>
                    <span class="os-sep">/</span>
                    <span class="os-btn ${currentOS === 'mac' ? 'active' : ''}" onclick="setOS('mac')">MAC</span>
                </div>
            `;
            
            titleEl.innerHTML = `
                <div class="header-left">
                    <div class="header-title">${currentLang === 'ru' ? 'ИЗБРАННОЕ' : 'FAVORITES'}</div>
                    ${osHtml}
                </div>
                <div class="header-meta">${metaStr}</div>
            `;
            
            if (!favorites.length) { document.getElementById('grid').innerHTML = ''; return; }

            const colsCount = createGridCols();
            let colIndex = 0;
            let favGroups = {};
            
            favorites.forEach(strId => {
                const parts = strId.split('|');
                if(parts.length === 3) {
                    const appId = parts[0];
                    if (!favGroups[appId]) favGroups[appId] = [];
                    favGroups[appId].push(strId);
                }
            });

            Object.keys(favGroups).forEach(appId => {
                const app = rawData[appId];
                if(!app) return;
                
                let itemsHtml = '';
                favGroups[appId].forEach(strId => {
                    const [_, catEN, descEN] = strId.split('|');
                    const catData = app.data.find(c => c[1] === catEN);
                    if(catData) {
                        const itemData = catData[2].find(i => i[1] === descEN);
                        if(itemData) itemsHtml += buildItem(appId, catEN, itemData[0], itemData[1], itemData[2], itemData[3]);
                    }
                });
                
                if(itemsHtml) {
                    const catId = `fav|${appId}`;
                    const isCollapsed = collapsedStates.includes(catId);
                    const collapsedClass = isCollapsed ? 'collapsed' : '';
                    
                    const catHtml = `
                    <div class="category ${collapsedClass}" style="--current-color: ${app.color}; border-color: ${app.color};">
                        <div class="cat-title" style="color:${app.color};" onclick="toggleCategory(this, '${catId}')">
                            <div class="cat-name">${app.title}</div>
                        </div>
                        <div class="cat-content">
                            ${itemsHtml}
                        </div>
                    </div>`;
                    
                    document.getElementById(`col-${colIndex}`).innerHTML += catHtml;
                    colIndex = (colIndex + 1) % colsCount;
                }
            });
            return;
        }

        const app = rawData[id];
        mainArea.style.setProperty('--current-color', app.color);
        
        const isWinOnly = ['np', 'tc', 'pp'].includes(id);
        const isSettings = ['ex', 'fg'].includes(id);
        
        let osHtml = '';
        if (!isSettings) {
            if (isWinOnly) {
                osHtml = `<div class="os-switch static"><span class="os-btn active">WIN ONLY</span></div>`;
            } else {
                osHtml = `
                    <div class="os-switch">
                        <span class="os-btn ${currentOS === 'win' ? 'active' : ''}" onclick="setOS('win')">WIN</span>
                        <span class="os-sep">/</span>
                        <span class="os-btn ${currentOS === 'mac' ? 'active' : ''}" onclick="setOS('mac')">MAC</span>
                    </div>
                `;
            }
        }

        let metaText = app.meta ? (currentLang === 'ru' ? app.meta[0] : app.meta[1]) : '';
        let metaHtml = metaText ? `<div class="header-meta">${metaText}</div>` : '';
        
        titleEl.innerHTML = `
            <div class="header-left">
                <div class="header-title">${app.title}</div>
                ${osHtml}
            </div>
            ${metaHtml}
        `;
        
        const colsCount = createGridCols();
        let colIndex = 0;

        if(app.data) {
            app.data.forEach(cat => {
                let itemsHtml = '';
                const displayCat = currentLang === 'ru' ? cat[0] : cat[1];
                let hasSABlock = false;

                cat[2].forEach(item => {
                    if (item[2] === "CUSTOM_UI_SA") {
                        itemsHtml += `<div id="sa-machine-root"></div>`;
                        hasSABlock = true;
                    } else {
                        itemsHtml += buildItem(id, cat[1], item[0], item[1], item[2], item[3]);
                    }
                });
                
                const catId = `${id}|${cat[1]}`;
                const catHtml = buildCategoryHTML(catId, displayCat, itemsHtml);
                document.getElementById(`col-${colIndex}`).innerHTML += catHtml;
                colIndex = (colIndex + 1) % colsCount;

                if (hasSABlock) setTimeout(renderSAMachine, 0);
            });
        }
    }

    renderNav();
    renderMain(currentApp);
</script>
</body>
</html>
